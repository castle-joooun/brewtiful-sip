spring:
  datasource:
    url: jdbc:h2:mem:brewtiful;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop   # 테스트는 H2에 엔티티 기반으로 스키마 생성(Flyway V1은 MySQL 전용).
  flyway:
    enabled: false            # V1 스키마는 MySQL 전용 문법. 테스트는 H2라 비활성.

brewtiful:
  master-code: test-master-code
