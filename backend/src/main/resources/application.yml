spring:
  application:
    name: brewtiful-sip
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway가 관리. JPA는 검증만.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# 운영자 인증용 마스터 코드 (ADR-0003) — 소스에 하드코딩하지 않고 환경변수로 주입.
brewtiful:
  master-code: ${BREWTIFUL_MASTER_CODE:}

logging:
  level:
    org.hibernate.SQL: debug
